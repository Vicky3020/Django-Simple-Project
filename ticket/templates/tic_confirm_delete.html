{% extends 'base.html' %}

{% block content %}
<h2>Delete Routes</h2>
<p>Are you sure you want to delete <strong>{{ ticket.routes }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
